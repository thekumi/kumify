{% extends "frontend/base.html" %}
{% load i18n %}
{% block content %}
<div class="card mb-4">
  <div class="card-header text-danger">Confirm deletion</div>
  <div class="card-body">
    <div class="md-delete-zone mb-4">
      <i class="ph ph-warning me-2"></i>
      Are you sure you want to delete <strong>{{ object.name }}</strong> and all its records? This cannot be undone.
    </div>
    <form method="post">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">
        <i class="ph ph-trash me-1"></i> Delete
      </button>
      <button type="button" onclick="history.back()" class="btn btn-light ms-2">Cancel</button>
    </form>
  </div>
</div>
{% endblock content %}

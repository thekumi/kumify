{% extends "frontend/base.html" %}
{% load i18n %}
{% block content %}
<div class="card mb-4">
  <div class="card-header">Your Activities</div>
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table table-hover table-clickable mb-0" id="dataTable">
        <thead>
          <tr><th>Name</th></tr>
        </thead>
        <tbody>
          {% for activity in object_list %}
          <tr onclick="window.location.href='{% url "mood:activity_edit" activity.id %}'">
            <td>
              <i style="color:{{ activity.color }}" class="{{ activity.icon }}"></i>
              {{ activity }}
            </td>
          </tr>
          {% empty %}
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>
{% endblock content %}

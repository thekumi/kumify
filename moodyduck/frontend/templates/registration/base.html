{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>MoodyDuck</title>
    <link href="https://googledonts.private.coffee/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://nobsdelivr.private.coffee/npm/@phosphor-icons/web@2.1.1/src/index.css">
    <link href="https://nobsdelivr.private.coffee/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'frontend/css/moodyduck.css' %}" rel="stylesheet">
  </head>
  <body>
    <div class="md-auth-wrapper">
      <div class="md-auth-card">
        <div class="md-auth-brand">
          <div class="md-auth-brand-icon">
            <i class="ph ph-feather"></i>
          </div>
          <div class="md-auth-brand-name">MoodyDuck</div>
        </div>
        {% block content %}{% endblock %}
      </div>
    </div>
    <script src="https://nobsdelivr.private.coffee/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>

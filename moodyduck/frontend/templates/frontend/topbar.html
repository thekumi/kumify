{% load i18n %}
<header class="md-topbar">
  <button class="md-topbar-toggle" data-sidebar-toggle aria-label="Toggle sidebar">
    <i class="ph ph-list"></i>
  </button>

  <div class="md-topbar-spacer"></div>

  <div class="md-topbar-user dropdown">
    <button class="md-user-btn dropdown-toggle-no-caret"
            id="userDropdown"
            data-bs-toggle="dropdown"
            aria-expanded="false">
      <div class="md-user-avatar">
        {% if request.user.get_full_name %}
          {{ request.user.get_full_name|first|upper }}
        {% else %}
          {{ request.user.username|first|upper }}
        {% endif %}
      </div>
      <span class="md-user-name d-none d-md-inline">
        {% if request.user.get_full_name %}
          {{ request.user.get_full_name }}
        {% else %}
          {{ request.user.username }}
        {% endif %}
      </span>
      <i class="ph ph-caret-down md-user-chevron d-none d-md-inline"></i>
    </button>

    <ul class="dropdown-menu dropdown-menu-end shadow border-0 py-2 md-user-dropdown"
        aria-labelledby="userDropdown">
      <li>
        <a class="dropdown-item rounded-2 py-2" href="{% url 'profiles:profile_view' %}">
          <i class="ph ph-user me-2 text-muted"></i> {% trans "Profile" %}
        </a>
      </li>
      <li>
        <a class="dropdown-item rounded-2 py-2" href="{% url 'profiles:integrations' %}">
          <i class="ph ph-plug me-2 text-muted"></i> {% trans "Integrations" %}
        </a>
      </li>
      <li><hr class="dropdown-divider my-1"></li>
      <li>
        <a class="dropdown-item rounded-2 py-2 text-danger"
           href="#"
           data-bs-toggle="modal"
           data-bs-target="#logoutModal">
          <i class="ph ph-sign-out me-2"></i> {% trans "Sign out" %}
        </a>
      </li>
    </ul>
  </div>
</header>

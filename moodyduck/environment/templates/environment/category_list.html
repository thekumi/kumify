{% extends "frontend/base.html" %}
{% load i18n %}
{% block content %}
<div class="card">
  <div class="card-header">{% trans "CO₂ Categories" %}</div>
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table table-hover table-clickable mb-0" id="dataTable">
        <thead><tr><th>{% trans "Name" %}</th><th>{% trans "Description" %}</th></tr></thead>
        <tbody>
          {% for cat in object_list %}
            <tr onclick="window.location.href='{% url "environment:category_edit" cat.id %}'">
              <td><strong>{{ cat.name }}</strong></td>
              <td class="text-muted">{{ cat.description|default:"—"|truncatechars:80 }}</td>
            </tr>
          {% empty %}
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>
{% endblock content %}
